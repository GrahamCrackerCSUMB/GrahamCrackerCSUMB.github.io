<!DOCTYPE html>
<html>
<head>
   <title> Sign Up Page </title>
   <link rel="stylesheet" href="CSS/styles.css">
</head>

<body>
    <h1> Sign Up </h1>

    <form id="signupForm" action="welcome.html">
    <div id="formBox">

        <div class="sectionBox">
            <h2>Personal Info</h2>

            <label>First Name:</label>
            <input type="text" name="fName"><br>

            <label>Last Name:</label>
            <input type="text" name="lName"><br>

            <label>Gender:</label>
            <div class="gender-group">
                <input type="radio" name="gender" value="m"> Male
                <input type="radio" name="gender" value="f"> Female
            </div>

            </div>

        <div class="sectionBox">
            <h2>Location Info</h2>

            <label>Zip Code:</label>
            <input type="text" id="zip" name="zip">
            <span id="zipcodeError"></span><br>

            <label>City:</label>
            <span id="city"></span><br>

            <label>Latitude:</label>
            <span id="latitude"></span><br>

            <label>Longitude:</label>
            <span id="longitude"></span><br>

            <label>State:</label>
            <select id="state" name="state"></select><br>

            <label>Select a County:</label>
            <select id="county"></select>
        </div>

        <div class="sectionBox">
            <h2>Account Info</h2>

            <label>Desired Username:</label>
            <input type="text" id="username" name="username"><br>
            <span id="usernameError"></span><br>

            <label>Password:</label>
            <input type="password" name="password" id="password">
            <span id="suggestedPwd"></span><br>

            <label>Type Password Again:</label>
            <input type="password" name="passwordCheck" id="passwordCheck"><br>

            <span id="passwordError"></span><br><br>
        </div>

        <div class="button-row">
            <input type="submit" value="Sign up!">
        </div>
    </div>

    
</form>

         <script src="js/script.js"></script>
</body>
</html>
